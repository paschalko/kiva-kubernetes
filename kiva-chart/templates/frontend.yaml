apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiva-frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: kiva-frontend
  template:
    metadata:
      labels:
        app: kiva-frontend
    spec:
      containers:
      - name: kiva-frontend
        image: {{ .Values.frontend.image }}
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: kiva-frontend
spec:
  type: NodePort
  selector:
    app: kiva-frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: {{ .Values.frontend.nodePort }}